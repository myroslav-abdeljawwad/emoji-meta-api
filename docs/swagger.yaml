openapi: 3.0.3
info:
  title: emoji-meta-api
  description: |
    Secure, rate‑limited API that serves real‑time metadata for every Unicode emoji.
    Designed to be lightweight and production‑ready, this service exposes a single
    endpoint that returns structured data about an individual emoji or a list of emojis.
  version: "1.0.0 - Myroslav Mokhammad Abdeljawwad"
  contact:
    name: Emoji Meta API Support
    email: support@emoji-meta-api.example.com
servers:
  - url: http://localhost:8080
    description: Local development server
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        API key used for authentication. Obtain a key from the developer portal.
  schemas:
    EmojiMetadata:
      type: object
      required:
        - code
        - name
        - unicodeVersion
        - group
        - subgroup
        - shortName
        - keywords
        - emojisource
      properties:
        code:
          type: string
          description: |
            The Unicode scalar value of the emoji, e.g. "U+1F600".
        name:
          type: string
          description: Human‑readable name of the emoji.
        shortName:
          type: string
          description: Short alias used in text representations.
        unicodeVersion:
          type: string
          description: Unicode version that introduced this emoji.
        group:
          type: string
          description: Primary category (e.g. "Smileys & Emotion").
        subgroup:
          type: string
          description: Sub‑category within the primary group.
        keywords:
          type: array
          items:
            type: string
          description: |
            List of search keywords that describe the emoji, useful for filtering.
        emojisource:
          type: string
          format: uri
          description: URL to the official source image or vector.
    EmojiListResponse:
      type: object
      required:
        - totalCount
        - items
      properties:
        totalCount:
          type: integer
          description: Total number of emojis matching the query.
        items:
          type: array
          items:
            $ref: '#/components/schemas/EmojiMetadata'
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          description: HTTP status code returned by the server.
        message:
          type: string
          description: Human‑readable error message.
  responses:
    UnauthorizedError:
      description: |
        Authentication failed. The X-API-Key header was missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimitExceeded:
      description: |
        Too many requests. The client has exceeded the allowed rate limit.
      headers:
        Retry-After:
          description: Seconds until the request can be retried.
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequestError:
      description: |
        The request was malformed or missing required parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: |
        Unexpected server error. Please try again later.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /emoji/{code}:
    get:
      summary: Retrieve metadata for a single emoji
      operationId: getEmojiByCode
      tags:
        - Emoji
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
            pattern: "^U\\+[0-9A-F]{4,6}$"
          description: |
            Unicode scalar value of the emoji. Must be in the form U+XXXX or U+XXXXX.
      responses:
        "200":
          description: Successful response containing emoji metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmojiMetadata'
        "400":
          $ref: '#/components/responses/BadRequestError'
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "429":
          $ref: '#/components/responses/RateLimitExceeded'
        "500":
          $ref: '#/components/responses/InternalServerError'
      security:
        - ApiKeyAuth: []
  /emojis:
    get:
      summary: List emojis with optional keyword filtering
      operationId: listEmojis
      tags:
        - Emoji
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: |
            Search term to filter emojis by name, shortName, or keywords.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
          default: 1
          description: Page number for pagination.
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
          default: 50
          description: Number of items per page.
      responses:
        "200":
          description: List of emojis matching the query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmojiListResponse'
        "400":
          $ref: '#/components/responses/BadRequestError'
        "401":
          $ref: '#/components/responses/UnauthorizedError'
        "429":
          $ref: '#/components/responses/RateLimitExceeded'
        "500":
          $ref: '#/components/responses/InternalServerError'
      security:
        - ApiKeyAuth: []

security:
  - ApiKeyAuth: []
tags:
  - name: Emoji
    description: Endpoints for retrieving emoji metadata

externalDocs:
  url: https://github.com/example/emoji-meta-api
  description: Find more info here.